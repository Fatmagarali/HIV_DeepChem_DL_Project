services:
  hiv-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8080"
    environment:
      HIV_API_HOST: 0.0.0.0
      PORT: 8080
      HIV_API_PORT: 8080
      HIV_DEFAULT_MODEL: graphconv
      HIV_SEED: 42
      HIV_DEVICE: cpu
      HIV_MODELS_DIR: models
      HIV_ARTIFACTS_DIR: artifacts
    volumes:
      - ./models:/app/models
      - ./artifacts:/app/artifacts
